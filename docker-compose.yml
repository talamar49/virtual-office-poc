services:
  virtual-office:
    build: .
    image: openclaw/virtual-office:latest
    container_name: virtual-office
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - GATEWAY_URL=${GATEWAY_URL:-http://host.docker.internal:18789}
      - GATEWAY_TOKEN=${GATEWAY_TOKEN}
      - PORT=3001
    env_file:
      - server/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
